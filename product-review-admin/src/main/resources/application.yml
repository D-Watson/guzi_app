server:
  port: 8080

spring:
  application:
    name: product-review-admin
  datasource:
    url: jdbc:mysql://localhost:3306/product_review?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  jwt:
    secret: dev-secret-key-change-in-production-min-32chars!!
    expiration-ms: 86400000
  upload:
    base-path: /data/uploads
    allowed-extensions: jpg,jpeg,png,webp